<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FanFlix – Your Codes</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E50914;--red2:#c8000e;
  --bg:#060606;--s1:#0e0e0e;--s2:#141414;--s3:#1a1a1a;--s4:#222;--s5:#2a2a2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#fff;--muted:#888;--muted2:#555;--muted3:#333;
  --green:#46d369;--amber:#f5a623;--blue:#4da6ff;
  --f:'Inter',sans-serif;--m:'IBM Plex Mono',monospace;--h:'Anton',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg::before{content:'';position:absolute;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(229,9,20,.09),transparent 65%);animation:bgf 12s ease-in-out infinite}
.bg::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(229,9,20,.05),transparent 65%);animation:bgf 16s ease-in-out infinite reverse}
@keyframes bgf{0%,100%{transform:translate(0,0)}50%{transform:translate(2%,3%)}}
.prog{position:fixed;top:0;left:0;right:0;height:2px;z-index:1000}
.prog-bar{height:100%;background:var(--red);width:0;box-shadow:0 0 8px var(--red)}
.prog.on .prog-bar{animation:progAnim 1.5s ease infinite}
@keyframes progAnim{0%{width:0;margin-left:0}50%{width:60%}100%{width:0;margin-left:100%}}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(6,6,6,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--h);font-size:1.8rem;letter-spacing:3px}
.logo .f{color:var(--red)}.logo .l{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:.8rem}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(70,211,105,.08);border:1px solid rgba(70,211,105,.2);border-radius:100px;padding:6px 14px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:lpulse 2s ease infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 0 rgba(70,211,105,.5)}70%{box-shadow:0 0 0 5px rgba(70,211,105,0)}}
.live-txt{font-family:var(--m);font-size:.6rem;letter-spacing:2px;color:var(--green);text-transform:uppercase}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--h);font-size:1rem;color:#fff;flex-shrink:0}

/* PAGE */
.page{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:1.5rem 1.2rem 6rem}

/* STATUS CARD — main big card */
.status-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.6rem;margin-bottom:1rem;display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:1.2rem;animation:fadeUp .5s ease both}
.status-card.warning{border-color:rgba(245,166,35,.2)}
.status-card.danger{border-color:rgba(229,9,20,.2)}
.shield-wrap{position:relative;width:60px;height:60px;flex-shrink:0}
.shield-ring{position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(70,211,105,.2);animation:ringPulse 2s ease infinite}
.shield-ring2{position:absolute;inset:-13px;border-radius:50%;border:1px solid rgba(70,211,105,.08);animation:ringPulse 2s ease .5s infinite}
.warning .shield-ring{border-color:rgba(245,166,35,.2)}.warning .shield-ring2{border-color:rgba(245,166,35,.08)}
.danger .shield-ring{border-color:rgba(229,9,20,.2)}.danger .shield-ring2{border-color:rgba(229,9,20,.08)}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.5}}
.shield-ico{width:60px;height:60px;border-radius:16px;background:rgba(70,211,105,.1);display:flex;align-items:center;justify-content:center}
.warning .shield-ico{background:rgba(245,166,35,.1)}.danger .shield-ico{background:rgba(229,9,20,.1)}
.status-info{min-width:0}
.status-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:lpulse 1.5s ease infinite;flex-shrink:0}
.status-card.active .status-title{color:var(--green)}
.status-card.warning .status-title{color:var(--amber)}.status-card.warning .status-dot{background:var(--amber)}
.status-card.danger .status-title{color:var(--red)}.status-card.danger .status-dot{background:var(--red)}
.status-sub{font-size:.8rem;color:var(--muted);line-height:1.5}

/* DAYS + PROGRESS side by side */
.days-block{text-align:center;flex-shrink:0;padding:0 .5rem}
.days-num{font-family:var(--h);font-size:3.5rem;line-height:1;color:var(--green)}
.status-card.warning .days-num{color:var(--amber)}
.status-card.danger .days-num{color:var(--red)}
.days-lbl{font-family:var(--m);font-size:.52rem;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-top:2px}
.prog-block{flex-shrink:0;min-width:160px}
.prog-lbl{font-family:var(--m);font-size:.6rem;color:var(--muted2);margin-bottom:6px}
.prog-track{background:var(--s4);border-radius:100px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;transition:width .6s ease}
.prog-fill.green{background:linear-gradient(90deg,var(--green),#2ecc71)}
.prog-fill.amber{background:linear-gradient(90deg,var(--amber),#f39c12)}
.prog-fill.red{background:linear-gradient(90deg,var(--red),#c0392b)}
.prog-pct{font-family:var(--m);font-size:.58rem;color:var(--muted2);text-align:right;margin-top:4px}

/* INFO GRID — 3 columns */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem;animation:fadeUp .5s ease .05s both}
.info-grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:1rem;animation:fadeUp .5s ease .1s both}
.info-cell{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;display:flex;align-items:center;gap:.85rem}
.info-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.info-icon.red{background:rgba(229,9,20,.15)}.info-icon.blue{background:rgba(77,166,255,.12)}.info-icon.amber{background:rgba(245,166,35,.12)}.info-icon.green{background:rgba(70,211,105,.12)}.info-icon.grey{background:var(--s4)}.info-icon.purple{background:rgba(150,100,255,.12)}
.info-lbl{font-family:var(--m);font-size:.52rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}
.info-val{font-size:.88rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-val.green{color:var(--green)}.info-val.amber{color:var(--amber)}
.info-sub{font-size:.68rem;color:var(--muted2);margin-top:2px}
.copy-row{display:flex;align-items:center;gap:4px;margin-top:4px;cursor:pointer;background:none;border:none;color:var(--muted2);font-family:var(--m);font-size:.58rem;padding:0;transition:color .2s}
.copy-row:hover{color:var(--text)}
.pin-row{display:flex;align-items:center;gap:6px}
.pin-toggle{background:none;border:none;color:var(--muted2);cursor:pointer;padding:0;transition:color .2s}
.pin-toggle:hover{color:var(--text)}

/* REFRESH BTN */
.refresh-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--red2));border:none;border-radius:14px;padding:1.3rem 2rem;cursor:pointer;margin-bottom:1rem;animation:fadeUp .5s ease .15s both;display:flex;align-items:center;justify-content:center;gap:1rem;transition:all .2s;position:relative;overflow:hidden}
.refresh-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);pointer-events:none}
.refresh-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 32px rgba(229,9,20,.35)}
.refresh-btn:disabled{opacity:.7;cursor:not-allowed}
.rbig-icon{flex-shrink:0}
.rbig-icon.spinning{animation:spin 1s linear infinite}
.rbig-text{}
.rbig-title{font-family:var(--h);font-size:1.3rem;letter-spacing:4px;color:#fff;text-transform:uppercase;display:block}
.rbig-sub{font-family:var(--m);font-size:.68rem;color:rgba(255,255,255,.5);letter-spacing:1px;display:block;margin-top:2px}

/* LIVE ACTIVITY */
.activity-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.3rem;margin-bottom:1rem;animation:fadeUp .5s ease .2s both}
.activity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.activity-title{display:flex;align-items:center;gap:.5rem;font-size:.88rem;font-weight:600}
.live-badge{background:rgba(70,211,105,.15);border:1px solid rgba(70,211,105,.3);color:var(--green);font-family:var(--m);font-size:.58rem;letter-spacing:2px;padding:4px 10px;border-radius:6px;text-transform:uppercase}
.activity-list{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:.8rem;align-items:flex-start;padding:.5rem 0;position:relative}
.activity-item:not(:last-child)::after{content:'';position:absolute;left:5px;top:20px;bottom:-4px;width:1px;background:var(--s4)}
.act-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid var(--bg)}
.act-dot.green{background:var(--green)}.act-dot.grey{background:var(--muted3)}
.act-time{font-family:var(--m);font-size:.6rem;color:var(--muted2);flex-shrink:0;width:52px;padding-top:1px}
.act-title{font-size:.82rem;font-weight:500}
.act-sub{font-size:.7rem;color:var(--muted2);margin-top:1px}

/* CODES */
.codes-wrap{animation:fadeUp .5s ease .25s both}
.codes-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem}
.codes-title{font-size:.95rem;font-weight:700}
.code-count-badge{background:var(--s3);border:1px solid var(--border);border-radius:100px;padding:2px 10px;font-family:var(--m);font-size:.6rem;color:var(--muted)}
.tabs{display:flex;gap:.4rem;margin-bottom:.9rem;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:var(--f)}
.tab.active-all{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);color:var(--text)}
.tab.active-household{background:rgba(70,211,105,.1);border-color:rgba(70,211,105,.3);color:var(--green)}
.tab.active-update{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.3);color:var(--amber)}
.tab.active-signin{background:rgba(77,166,255,.1);border-color:rgba(77,166,255,.3);color:var(--blue)}
.tc{font-family:var(--m);font-size:.6rem;opacity:.6}
.cards{display:flex;flex-direction:column;gap:.7rem}

/* CODE CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.3rem 1.5rem;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:1.1rem;position:relative;overflow:hidden;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;transition:border-color .2s,transform .2s}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.card.household::before{background:var(--green)}.card.update::before{background:var(--amber)}.card.signin::before{background:var(--blue)}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.fresh.household{background:linear-gradient(135deg,rgba(70,211,105,.05),var(--s1) 60%);border-color:rgba(70,211,105,.18)}
.card.fresh.update{background:linear-gradient(135deg,rgba(245,166,35,.05),var(--s1) 60%);border-color:rgba(245,166,35,.18)}
.card.fresh.signin{background:linear-gradient(135deg,rgba(77,166,255,.05),var(--s1) 60%);border-color:rgba(77,166,255,.18)}
.fresh-badge{position:absolute;top:10px;right:12px;font-family:var(--m);font-size:.5rem;letter-spacing:2px;padding:3px 8px;border-radius:3px;font-weight:600;text-transform:uppercase}
.household .fresh-badge{background:var(--green);color:#000;animation:fglow 2s ease infinite}
.update .fresh-badge{background:var(--amber);color:#000}
.signin .fresh-badge{background:var(--blue);color:#fff}
@keyframes fglow{0%,100%{box-shadow:0 0 6px rgba(70,211,105,.3)}50%{box-shadow:0 0 18px rgba(70,211,105,.7)}}
.c-ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.household .c-ico{background:rgba(70,211,105,.1)}.update .c-ico{background:rgba(245,166,35,.1)}.signin .c-ico{background:rgba(77,166,255,.1)}
.pdot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--s1);animation:dotpop 1.5s ease infinite}
@keyframes dotpop{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.tv-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.9),transparent);animation:scan 2s ease infinite}
@keyframes scan{0%{top:-2px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:110%;opacity:0}}
.c-type{font-family:var(--m);font-size:.57rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.household .c-type{color:var(--green)}.update .c-type{color:var(--amber)}.signin .c-type{color:var(--blue)}
.c-code{font-family:var(--h);font-size:3.4rem;letter-spacing:14px;line-height:1;color:var(--text)}
.c-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:.82rem;font-weight:500;border:1px solid;border-radius:8px;padding:10px 18px;margin-top:6px;transition:all .2s}
.c-link.g{color:var(--green);border-color:rgba(70,211,105,.25)}.c-link.g:hover{background:rgba(70,211,105,.08)}
.c-link.a{color:var(--amber);border-color:rgba(245,166,35,.25)}.c-link.a:hover{background:rgba(245,166,35,.08)}
.c-meta{display:flex;align-items:center;gap:.8rem;margin-top:6px}
.c-time{font-family:var(--m);font-size:.58rem;color:var(--muted2)}
.c-countdown{font-family:var(--m);font-size:.6rem}
.countdown-ok{color:var(--green)}.countdown-warn{color:var(--amber)}.countdown-exp{color:var(--red)}
.cflip{animation:cflip .15s ease}
@keyframes cflip{0%{opacity:0;transform:translateY(-3px)}100%{opacity:1;transform:none}}
.cp-btn{background:var(--s3);border:1px solid var(--s5);color:var(--muted2);padding:10px 18px;border-radius:9px;cursor:pointer;font-family:var(--m);font-size:.63rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap;flex-shrink:0}
.cp-btn:hover{border-color:var(--border2);color:var(--text);background:var(--s4)}
.cp-btn.ok{border-color:var(--green)!important;color:var(--green)!important;background:rgba(70,211,105,.07)!important}

/* EMPTY */
.empty{text-align:center;padding:3.5rem 1rem}
.empty-icon{margin-bottom:1rem;opacity:.15}
.empty h3{font-family:var(--h);font-size:1.3rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
.empty p{font-size:.82rem;color:var(--muted2);line-height:1.8}

/* EXPIRED / ERROR */
.exp-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:2rem;text-align:center}
.exp-logo{font-family:var(--h);font-size:2rem;letter-spacing:3px;margin-bottom:2rem}
.exp-logo .f{color:var(--red)}.exp-logo .l{color:var(--muted3)}
.exp-box{background:var(--s1);border:1px solid rgba(229,9,20,.2);border-radius:20px;padding:2.5rem 2rem;max-width:380px;width:100%}
.exp-title{font-family:var(--h);font-size:1.8rem;letter-spacing:2px;color:var(--red);margin-bottom:.5rem;text-transform:uppercase}
.exp-msg{font-size:.85rem;color:var(--muted);line-height:1.8;margin-bottom:1.8rem}
.wa-big{display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#000;padding:13px 26px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem;transition:all .25s}
.wa-big:hover{background:#1ebe5d;transform:translateY(-2px)}

/* SKELETON */
.sk{background:linear-gradient(90deg,var(--s3) 25%,var(--s4) 50%,var(--s3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* RENEWAL POPUP */
.renewal-popup{display:none;opacity:0;transition:opacity .4s;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1rem;align-items:center;gap:.9rem}

/* WA FLOAT */
.wa-float{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;width:52px;height:52px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 20px rgba(37,211,102,.4);animation:waf 3s ease infinite}
@keyframes waf{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.3)}50%{box-shadow:0 4px 30px rgba(37,211,102,.6)}}

/* COPY OVERLAY */
.copy-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s}
.copy-overlay.show{opacity:1}
.copy-box{background:rgba(0,0,0,.92);border:1px solid rgba(70,211,105,.3);border-radius:20px;padding:1.8rem 2.5rem;display:flex;flex-direction:column;align-items:center;gap:.7rem;backdrop-filter:blur(20px);transform:scale(.8);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.copy-overlay.show .copy-box{transform:scale(1)}
.copy-check{width:52px;height:52px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center}
.copy-lbl{font-family:var(--h);font-size:1.1rem;letter-spacing:3px;color:var(--text);text-transform:uppercase}

#toast{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;font-family:var(--h);font-size:.88rem;padding:10px 24px;border-radius:6px;letter-spacing:3px;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;white-space:nowrap;text-transform:uppercase}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .status-card{grid-template-columns:auto 1fr;grid-template-rows:auto auto}
  .days-block{grid-column:2;grid-row:1;text-align:right}
  .prog-block{grid-column:1/-1;min-width:unset}
  .info-grid,.info-grid2{grid-template-columns:1fr 1fr}
  .card{grid-template-columns:auto 1fr;padding:1rem 1.1rem}
  .cp-btn{display:none}.card{cursor:pointer}
  .c-code{font-size:2.8rem;letter-spacing:10px}
}
@media(max-width:380px){
  .info-grid,.info-grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="prog" id="prog"><div class="prog-bar" id="pbar"></div></div>

<nav>
  <div class="logo"><span class="f">FAN</span><span class="l">FLIX</span></div>
  <div class="nav-right">
    <div class="live-pill"><div class="ldot"></div><span class="live-txt">Live</span></div>
    <div class="nav-avatar" id="nav-avatar">?</div>
  </div>
</nav>

<div id="page">
  <div class="page">
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:16px;height:120px;margin-bottom:1rem" class="sk"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem">
      <div style="height:90px;border-radius:14px" class="sk"></div>
      <div style="height:90px;border-radius:14px" class="sk"></div>
      <div style="height:90px;border-radius:14px" class="sk"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:1rem">
      <div style="height:90px;border-radius:14px" class="sk"></div>
      <div style="height:90px;border-radius:14px" class="sk"></div>

  window._tok=token;
  startProg();
  fetchCodes(token);
};

function startProg(){document.getElementById('prog').classList.add('on')}
function stopProg(){
  const p=document.getElementById('prog');p.classList.remove('on');
  const b=document.getElementById('pbar');b.style.width='100%';
  setTimeout(()=>{b.style.width='0';},400);
}

async function fetchCodes(token,isRefresh=false){
  if(isRefresh){
    startProg();
    const rb=document.getElementById('rbig-icon');if(rb)rb.classList.add('spinning');
  }
  try{
    const res=await fetch(`/api/link/${token}`);
    const data=await res.json();
    stopProg();
    const rb=document.getElementById('rbig-icon');if(rb)rb.classList.remove('spinning');
    if(!data.success){
      if(data.error==='expired')showExpired();
      else showError(data.error,data.message);
      return;
    }
    const now=Date.now();
    data.codes=data.codes.filter(c=>{
      if(c.code&&BLOCKED.includes(c.code))return false;
      if(c.expiresAt&&c.expiresAt<now)return false;
      return true;
    });
    const seen=new Set();
    data.codes=data.codes.filter(c=>{const k=c.code||c.link;if(seen.has(k))return false;seen.add(k);return true;});
    allCodes=data.codes;
    window._ld=data;
    if(!isRefresh){
      buildPage(data);
      addActivity('green','Ready','System is active');
    } else {
      updateCodes(data);
      const rb2=document.getElementById('rbig-icon');if(rb2)rb2.classList.remove('spinning');
      if(data.codes.length>0){
        addActivity('green',`${data.codes.length} code(s) found`,'Codes ready to copy');
        playBeep();
      }
    }
    if(refreshTimer)clearInterval(refreshTimer);
    refreshTimer=setInterval(()=>fetchCodes(token,true),60*1000);
    if(cdTimer)clearInterval(cdTimer);
    cdTimer=setInterval(tickCd,1000);
    if(data.daysLeft<=3&&data.daysLeft>0){
      setTimeout(()=>{const p=document.getElementById('renewal-popup');if(p){p.style.display='flex';setTimeout(()=>p.style.opacity='1',50);}},1500);
    }
  }catch(e){
    stopProg();
    const rb=document.getElementById('rbig-icon');if(rb)rb.classList.remove('spinning');
    if(!isRefresh)showError('error','Could not connect.');
  }
}

function doManualRefresh(){
  const btn=document.getElementById('refresh-btn');
  if(btn)btn.disabled=true;

  });
}

function updateCodes(data){
  allCodes=data.codes;
  const h=allCodes.filter(c=>c.type==='household').length;
  const u=allCodes.filter(c=>c.type==='update').length;
  const s=allCodes.filter(c=>c.type==='signin').length;
  const safe=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v;};
  safe('code-badge',allCodes.length);
  safe('tab-all',`All <span class="tc">${allCodes.length}</span>`);
  safe('tab-household',`Household <span class="tc">${h}</span>`);
  safe('tab-update',`TV Update <span class="tc">${u}</span>`);
  renderCards(true);
}

function addActivity(dotCls,title,sub){
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  activityLog.unshift({dotCls,title,sub,time:now});
  if(activityLog.length>3)activityLog=activityLog.slice(0,3);
  const list=document.getElementById('activity-list');
  if(!list)return;
  list.innerHTML=activityLog.map(a=>`
    <div class="activity-item">
      <div class="act-dot ${a.dotCls}"></div>
      <div class="act-time">${a.time}</div>
      <div class="act-body"><div class="act-title">${a.title}</div><div class="act-sub">${a.sub}</div></div>
    </div>`).join('');
}

function switchTab(t){
  curTab=t;

  const el=document.getElementById('tab-'+t);if(el)el.classList.add('tab','active-'+t);
  renderCards();
}

function renderCards(smooth=false){
  const list=curTab==='all'?allCodes:allCodes.filter(i=>i.type===curTab);
  const c=document.getElementById('cards');if(!c)return;
  if(!list.length){
    c.innerHTML=`<div class="empty">

      <h3>No Codes Found</h3>
      <p>No Netflix codes in the last 20 minutes.<br>Request a code on your Netflix device,<br>then tap <strong>Refresh Codes</strong>.</p>
    </div>`;
    return;
  }
  const html=list.map((item,i)=>cardHtml(item,i)).join('');
  if(smooth){
    c.style.opacity='0';c.style.transition='opacity .2s';
    setTimeout(()=>{c.innerHTML=html;c.style.opacity='1';attachL();},180);
  }else{c.innerHTML=html;attachL();}
}

function attachL(){
  document.querySelectorAll('.card[data-code]').forEach(c=>{

}

function cardHtml(item,i){
  const delay=`animation-delay:${i*.07}s`;
  const fresh=(Date.now()-item.ts)<10*60*1000;

  const phoneIco=`<div class="c-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#46d369" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.5" stroke-linecap="round"/></svg><div class="pdot"></div></div>`;
  const tvIco=`<div class="c-ico" style="position:relative"><svg width="28" height="22" viewBox="0 0 24 20" fill="none" stroke="#f5a623" stroke-width="2"><rect x="1" y="1" width="22" height="14" rx="2"/><line x1="8" y1="18" x2="16" y2="18"/><line x1="12" y1="15" x2="12" y2="18"/></svg><div style="position:absolute;inset:4px 5px 6px;background:rgba(245,166,35,.1);border-radius:2px;overflow:hidden"><div class="tv-scan"></div></div></div>`;
  const lockIco=`<div class="c-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4da6ff" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>`;

  if(item.type==='update')return`<div class="card update${fc}" style="${delay}">${fb}${tvIco}<div style="min-width:0"><div class="c-type">TV Household Update</div><a class="c-link a" href="${esc(item.link)}" target="_blank">Update Household →</a><div class="c-meta">${timeTag}</div></div><button class="cp-btn" onclick="doCopy('${esc(item.link)}',this,false)">Copy</button></div>`;

  if(item.type==='signin')return`<div class="card signin${fc}" style="${delay}" data-code="${esc(item.code)}">${fb}${lockIco}<div style="min-width:0"><div class="c-type">Sign-in Code</div><div class="c-code">${item.code}</div><div class="c-meta">${timeTag}${cd}</div></div><button class="cp-btn" onclick="event.stopPropagation();doCopy('${esc(item.code)}',this,false)">Copy</button></div>`;

  if(item.code)return`<div class="card household${fc}" style="${delay}" data-code="${esc(item.code)}">${fb}${phoneIco}<div style="min-width:0"><div class="c-type">Temporary Access Code</div><div class="c-code">${item.code}</div><div class="c-meta">${timeTag}${cd}</div></div><button class="cp-btn" onclick="event.stopPropagation();doCopy('${esc(item.code)}',this,false)">Copy</button></div>`;

  return`<div class="card household${fc}" style="${delay}">${fb}${phoneIco}<div style="min-width:0"><div class="c-type">Temporary Access Code</div><a class="c-link g" href="${esc(item.link)}" target="_blank">Get Code →</a><div class="c-meta">${timeTag}</div></div><button class="cp-btn" onclick="doCopy('${esc(item.link)}',this,false)">Copy</button></div>`;
}

function fmtCd(exp){
  const r=exp-Date.now();
  if(r<=0)return`<span class="countdown-exp">Expired</span>`;
  const m=Math.floor(r/60000),s=Math.floor((r%60000)/1000);
  const cls=r<2*60*1000?'countdown-warn':'countdown-ok';
  return`<span class="${cls}" data-exp="${exp}"><span class="ctime">${m}:${s.toString().padStart(2,'0')}</span></span>`;
}

function tickCd(){
  document.querySelectorAll('[data-exp]').forEach(el=>{
    const exp=parseInt(el.dataset.exp);if(!exp||isNaN(exp))return;
    const r=exp-Date.now();
    const cls=r<2*60*1000?'countdown-warn':'countdown-ok';
    if(r<=0){el.className='countdown-exp';el.textContent='Expired';return;}
    if(r<2*60*1000)playBeep();
    const m=Math.floor(r/60000),s=Math.floor((r%60000)/1000);
    const t=el.querySelector('.ctime');
    const newT=`${m}:${s.toString().padStart(2,'0')}`;
    el.className=cls;
    if(t&&t.textContent!==newT){t.classList.add('cflip');t.textContent=newT;setTimeout(()=>t.classList.remove('cflip'),150);}
  });
}

function doCopy(text,btn,overlay){
  navigator.clipboard.writeText(text).then(()=>{
    if(btn){btn.textContent='Copied';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},2000);}
    if(overlay){const o=document.getElementById('copy-overlay');o.classList.add('show');setTimeout(()=>o.classList.remove('show'),1200);}
    showToast('Copied!');
  });
}

function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);o.start();o.stop(ctx.currentTime+.3);}catch(e){}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
