<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FanFlix – Your Codes</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E50914;--bg:#080808;--s1:#111;--s2:#161616;--s3:#1e1e1e;--s4:#252525;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#fff;--muted:#a0a0a0;--muted2:#555;--muted3:#333;
  --green:#46d369;--amber:#f5a623;--blue:#4da6ff;
  --f:'Inter',sans-serif;--m:'IBM Plex Mono',monospace;--h:'Anton',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
nav{
  background:rgba(8,8,8,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--h);font-size:1.7rem;letter-spacing:3px;user-select:none}
.logo .f{color:var(--red)}.logo .l{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(70,211,105,.4)}70%{box-shadow:0 0 0 6px rgba(70,211,105,0)}}
.nav-tag{font-family:var(--m);font-size:.6rem;letter-spacing:2px;color:var(--muted2);text-transform:uppercase}

/* MAIN */
main{max-width:600px;margin:0 auto;padding:2rem 1.2rem 5rem}

/* CUSTOMER HEADER */
.cust-header{
  background:var(--s1);border:1px solid var(--border);
  border-radius:10px;padding:1.3rem 1.4rem;
  margin-bottom:1.5rem;
  display:flex;align-items:center;gap:12px;
}
.cust-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  font-family:var(--h);font-size:1.2rem;color:#fff;flex-shrink:0;
}
.cust-name{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:3px}
.cust-email{font-family:var(--m);font-size:.7rem;color:var(--muted);letter-spacing:.5px}
.cust-expiry{font-family:var(--m);font-size:.6rem;color:var(--muted2);margin-top:3px}

/* REFRESH BTN */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.result-count{font-family:var(--m);font-size:.65rem;color:var(--muted2);letter-spacing:.5px}
.result-count b{color:var(--text)}
.ref-btn{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--s4);
  color:var(--muted);padding:6px 14px;border-radius:4px;
  cursor:pointer;font-family:var(--m);font-size:.62rem;
  letter-spacing:1.5px;text-transform:uppercase;transition:all .18s;
}
.ref-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.ref-btn.loading svg{animation:spin 1s linear infinite}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:9px 16px;background:transparent;border:none;
  color:var(--muted2);font-family:var(--f);font-size:.78rem;font-weight:500;
  cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .18s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.tab:hover{color:var(--muted)}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.tc{background:var(--s3);border-radius:3px;padding:1px 5px;font-size:.6rem;color:var(--muted2);font-family:var(--m);min-width:16px;text-align:center}
.tab.active .tc{background:rgba(229,9,20,.15);color:var(--red)}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:.7rem}
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:10px;padding:1.1rem 1.3rem;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:.9rem;
  transition:all .18s;animation:fadeUp .3s ease both;
  position:relative;overflow:hidden;cursor:default;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.household::before{background:var(--green)}
.card.update::before{background:var(--amber)}
.card.signin::before{background:var(--blue)}
.card:hover{border-color:var(--border2);transform:translateX(2px)}
.card.fresh{border-color:rgba(70,211,105,.2);background:linear-gradient(135deg,rgba(70,211,105,.04),var(--s1))}
.card.fresh.update{border-color:rgba(245,166,35,.2);background:linear-gradient(135deg,rgba(245,166,35,.04),var(--s1))}
.card.fresh.signin{border-color:rgba(77,166,255,.2);background:linear-gradient(135deg,rgba(77,166,255,.04),var(--s1))}

.fresh-badge{
  position:absolute;top:8px;right:9px;
  font-family:var(--m);font-size:.5rem;letter-spacing:2px;
  padding:2px 7px;border-radius:3px;font-weight:500;text-transform:uppercase;
}
.household .fresh-badge{background:var(--green);color:#000}
.update .fresh-badge{background:var(--amber);color:#000}
.signin .fresh-badge{background:var(--blue);color:#fff}

/* Animated icons */
.c-ico{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.household .c-ico{background:rgba(70,211,105,.1)}
.update .c-ico{background:rgba(245,166,35,.1)}
.signin .c-ico{background:rgba(77,166,255,.1)}

.phone-icon{transition:transform .1s}
.card.household:hover .phone-icon,.card.signin:hover .phone-icon{animation:vibrate .3s ease}
@keyframes vibrate{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(6deg)}}
.phone-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--s1);animation:dotblink 1.5s ease infinite}
@keyframes dotblink{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

.tv-wrap{position:relative;width:28px;height:22px}
.tv-screen{position:absolute;inset:3px 3px 5px;background:rgba(245,166,35,.12);border-radius:1px;overflow:hidden}
.tv-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.8),transparent);animation:scan 2s ease infinite}
@keyframes scan{0%{top:-2px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}

.c-type{font-family:var(--m);font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px}
.household .c-type{color:var(--green)}.update .c-type{color:var(--amber)}.signin .c-type{color:var(--blue)}
.c-code{font-family:var(--h);font-size:2.2rem;letter-spacing:10px;color:var(--text);line-height:1}
.c-link{
  display:inline-flex;align-items:center;gap:5px;text-decoration:none;
  font-family:var(--f);font-size:.75rem;font-weight:500;
  border:1px solid;border-radius:4px;padding:8px 13px;margin-top:4px;transition:all .18s;
}
.c-link.g{color:var(--green);border-color:rgba(70,211,105,.22)}.c-link.g:hover{background:rgba(70,211,105,.08);border-color:var(--green)}
.c-link.a{color:var(--amber);border-color:rgba(245,166,35,.22)}.c-link.a:hover{background:rgba(245,166,35,.08);border-color:var(--amber)}
.c-age{font-family:var(--m);font-size:.58rem;color:var(--muted3);margin-top:5px}

/* Countdown */
.c-countdown{font-family:var(--m);font-size:.63rem;margin-top:5px;display:flex;align-items:center;gap:5px}
.countdown-ok{color:var(--green)}.countdown-warn{color:var(--amber)}.countdown-exp{color:var(--red)}

.cp-btn{
  background:transparent;border:1px solid var(--s4);color:var(--muted2);
  padding:8px 13px;border-radius:4px;cursor:pointer;
  font-family:var(--m);font-size:.63rem;letter-spacing:1px;
  text-transform:uppercase;transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.cp-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.cp-btn.ok{border-color:var(--green)!important;color:var(--green)!important}

/* STATES */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted2)}
.empty-ico{font-size:2.2rem;margin-bottom:.8rem;opacity:.25}
.empty h3{font-family:var(--h);font-size:1.1rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.empty p{font-size:.82rem;font-weight:300;line-height:1.8}

.loading-wrap{text-align:center;padding:3rem}
.spin-ring{width:30px;height:30px;border:2px solid var(--s4);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .9rem}
.loading-wrap p{font-family:var(--m);font-size:.65rem;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}

/* ERROR */
.error-box{
  text-align:center;padding:3rem 1.5rem;
  background:var(--s1);border:1px solid rgba(229,9,20,.2);
  border-radius:10px;
}
.error-ico{font-size:2.5rem;margin-bottom:1rem}
.error-box h2{font-family:var(--h);font-size:1.5rem;letter-spacing:1px;margin-bottom:.5rem;color:var(--red)}
.error-box p{font-size:.85rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem}
.wa-link{
  display:inline-flex;align-items:center;gap:8px;
  background:#25D366;color:#000;padding:12px 24px;
  border-radius:5px;text-decoration:none;font-weight:600;font-size:.88rem;
  transition:all .2s;
}
.wa-link:hover{background:#1ebe5d;transform:translateY(-1px)}

/* WA floating */
.wa-float{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:500;
  width:50px;height:50px;border-radius:50%;
  background:#25D366;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,.4);
  text-decoration:none;transition:all .2s;
  animation:wapulse 2s ease infinite;
}
.wa-float:hover{transform:scale(1.1)}
@keyframes wapulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.3)}50%{box-shadow:0 4px 32px rgba(37,211,102,.6)}}

/* TOAST */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--green);color:#000;font-family:var(--h);font-size:.9rem;padding:9px 22px;border-radius:4px;letter-spacing:3px;opacity:0;transition:all .28s;pointer-events:none;z-index:999;white-space:nowrap;text-transform:uppercase}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:1.2rem 1.5rem;text-align:center}
footer p{font-family:var(--m);font-size:.55rem;color:var(--muted3);letter-spacing:1.5px}
footer span{color:var(--red)}

@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .card{grid-template-columns:auto 1fr}
  .cp-btn{display:none}
  .c-code{font-size:1.8rem;letter-spacing:7px}
  .card{cursor:pointer}
}
</style>
</head>
<body>

<nav>
  <div class="logo"><span class="f">FAN</span><span class="l">FLIX</span></div>
  <div class="nav-right">
    <div class="live-dot"></div>
    <span class="nav-tag">Your Codes</span>
  </div>
</nav>

<main id="main">
  <div class="loading-wrap">
    <div class="spin-ring"></div>
    <p>Loading your codes...</p>
  </div>
</main>

<a class="wa-float" href="https://wa.me/8801928382918" target="_blank" title="Need help?">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<div id="toast"></div>

<script>
let allCodes = [], curTab = 'all';

window.onload = () => {
  const token = window.location.pathname.match(/\/c\/([a-zA-Z0-9]+)/)?.[1];
  if (!token) {
    showError('invalid', 'Invalid link. Please contact FanFlix BD.');
    return;
  }
  loadCodes(token);
};

async function loadCodes(token) {
  try {
    const res = await fetch(`/api/link/${token}`);
    const data = await res.json();

    if (!data.success) {
      if (data.error === 'expired') showError('expired', 'Your access link has expired. Contact FanFlix BD to renew.');
      else if (data.error === 'revoked') showError('revoked', 'Your access has been revoked. Contact FanFlix BD.');
      else showError('invalid', 'Invalid or unknown link. Contact FanFlix BD.');
      return;
    }

    allCodes = data.codes;
    renderPage(data);
  } catch(e) {
    showError('error', 'Could not connect. Please try again.');
  }
}

function renderPage(data) {
  const h = allCodes.filter(c => c.type === 'household').length;
  const u = allCodes.filter(c => c.type === 'update').length;
  const s = allCodes.filter(c => c.type === 'signin').length;
  const initials = data.name ? data.name.charAt(0).toUpperCase() : 'F';

  document.getElementById('main').innerHTML = `
    <!-- Customer header -->
    <div class="cust-header">
      <div class="cust-avatar">${initials}</div>
      <div>
        <div class="cust-name">${esc(data.name)}</div>
        <div class="cust-email">${esc(data.email)}</div>
        <div class="cust-expiry">Last 20 minutes · Auto codes</div>
      </div>
    </div>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="result-count"><b>${allCodes.length}</b> code${allCodes.length !== 1 ? 's' : ''} found</div>
      <button class="ref-btn" id="ref-btn" onclick="refreshCodes()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-all" onclick="switchTab('all')">All <span class="tc">${allCodes.length}</span></button>
      <button class="tab" id="tab-household" onclick="switchTab('household')">📱 Household <span class="tc">${h}</span></button>
      <button class="tab" id="tab-update" onclick="switchTab('update')">📺 TV Update <span class="tc">${u}</span></button>
      ${s > 0 ? `<button class="tab" id="tab-signin" onclick="switchTab('signin')">🔑 Sign-in <span class="tc">${s}</span></button>` : ''}
    </div>

    <!-- Cards -->
    <div class="cards" id="cards"></div>
  `;

  renderCards();
  startCountdowns();

  // Store token for refresh
  window._token = window.location.pathname.match(/\/c\/([a-zA-Z0-9]+)/)?.[1];
}

async function refreshCodes() {
  const btn = document.getElementById('ref-btn');
  if (!btn) return;
  btn.classList.add('loading');
  try {
    const res = await fetch(`/api/link/${window._token}`);
    const data = await res.json();
    if (data.success) {
      allCodes = data.codes;
      document.querySelector('.result-count').innerHTML = `<b>${allCodes.length}</b> code${allCodes.length !== 1 ? 's' : ''} found`;
      renderCards();
      startCountdowns();
    }
  } catch(e) {}
  btn.classList.remove('loading');
}

function switchTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  const el = document.getElementById('tab-' + t);
  if (el) el.classList.add('active');
  renderCards();
}

function renderCards() {
  const list = curTab === 'all' ? allCodes : allCodes.filter(i => i.type === curTab);
  const container = document.getElementById('cards');
  if (!list.length) {
    container.innerHTML = `<div class="empty"><div class="empty-ico">📭</div><h3>No Codes Found</h3><p>No Netflix codes found in the last 20 minutes.<br>Request a code on your device then refresh.</p></div>`;
    return;
  }
  container.innerHTML = list.map((item, i) => cardHtml(item, i)).join('');
  document.querySelectorAll('.card[data-code]').forEach(c => {
    c.addEventListener('click', () => doCopy(c.dataset.code, null));
  });
}

function cardHtml(item, i) {
  const delay = `animation-delay:${i * 0.06}s`;
  const age = timeAgo(item.ts);
  const fresh = (Date.now() - item.ts) < 15 * 60 * 1000;
  const freshClass = fresh ? ' fresh' : '';
  const freshBadge = fresh ? '<span class="fresh-badge">Fresh</span>' : '';
  const countdown = item.expiresAt ? `<div class="countdown-wrap" data-expires="${item.expiresAt}">${formatCountdown(item.expiresAt)}</div>` : '';

  const phoneIco = `<div class="c-ico"><svg class="phone-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#46d369" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.5" stroke-linecap="round"/></svg><div class="phone-dot"></div></div>`;
  const tvIco = `<div class="c-ico"><div class="tv-wrap"><svg width="26" height="20" viewBox="0 0 24 20" fill="none" stroke="#f5a623" stroke-width="2"><rect x="1" y="1" width="22" height="14" rx="2"/><line x1="8" y1="18" x2="16" y2="18"/><line x1="12" y1="15" x2="12" y2="18"/></svg><div class="tv-screen"><div class="tv-scan"></div></div></div></div>`;
  const signinIco = `<div class="c-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4da6ff" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>`;

  if (item.type === 'update') {
    return `<div class="card update${freshClass}" style="${delay}">${freshBadge}${tvIco}<div style="min-width:0"><div class="c-type">TV Household Update</div><a class="c-link a" href="${esc(item.link)}" target="_blank">Update Household →</a><div class="c-age">${age}</div></div><button class="cp-btn" onclick="doCopy('${esc(item.link)}',this)">Copy</button></div>`;
  }
  if (item.type === 'signin') {
    return `<div class="card signin${freshClass}" style="${delay}" data-code="${esc(item.code)}">${freshBadge}${signinIco}<div style="min-width:0"><div class="c-type">Sign-in Code</div><div class="c-code">${item.code}</div><div class="c-age">${age}</div>${countdown}</div><button class="cp-btn" onclick="event.stopPropagation();doCopy('${esc(item.code)}',this)">Copy</button></div>`;
  }
  // Household
  if (item.code) {
    return `<div class="card household${freshClass}" style="${delay}" data-code="${esc(item.code)}">${freshBadge}${phoneIco}<div style="min-width:0"><div class="c-type">Temporary Access Code</div><div class="c-code">${item.code}</div><div class="c-age">${age}</div>${countdown}</div><button class="cp-btn" onclick="event.stopPropagation();doCopy('${esc(item.code)}',this)">Copy</button></div>`;
  }
  return `<div class="card household${freshClass}" style="${delay}">${freshBadge}${phoneIco}<div style="min-width:0"><div class="c-type">Temporary Access Code</div><a class="c-link g" href="${esc(item.link)}" target="_blank">Get Code →</a><div class="c-age">${age}</div>${countdown}</div><button class="cp-btn" onclick="doCopy('${esc(item.link)}',this)">Copy</button></div>`;
}

function showError(type, msg) {
  const icons = { expired: '⏰', revoked: '🚫', invalid: '❌', error: '⚠️' };
  const titles = { expired: 'Link Expired', revoked: 'Access Revoked', invalid: 'Invalid Link', error: 'Error' };
  document.getElementById('main').innerHTML = `
    <div class="error-box">
      <div class="error-ico">${icons[type] || '⚠️'}</div>
      <h2>${titles[type] || 'Error'}</h2>
      <p>${msg}</p>
      <a class="wa-link" href="https://wa.me/8801928382918" target="_blank">
        💬 Contact FanFlix BD
      </a>
    </div>`;
}

function formatCountdown(expiresAt) {
  const remaining = expiresAt - Date.now();
  if (remaining <= 0) return '<span class="countdown-exp">⏱ Expired</span>';
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  const cls = remaining < 2 * 60 * 1000 ? 'countdown-warn' : 'countdown-ok';
  if (remaining < 2 * 60 * 1000 && remaining > 119000) playBeep();
  return `<span class="c-countdown ${cls}">⏱ Expires in <b>${mins}:${secs.toString().padStart(2,'0')}</b></span>`;
}

function startCountdowns() {
  setInterval(() => {
    document.querySelectorAll('.countdown-wrap').forEach(el => {
      const exp = parseInt(el.dataset.expires);
      if (exp) el.innerHTML = formatCountdown(exp);
    });
  }, 1000);
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .3);
    osc.start(); osc.stop(ctx.currentTime + .3);
  } catch(e) {}
}

function doCopy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    if (btn) { btn.textContent = '✓ Copied'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2000); }
    const t = document.getElementById('toast');
    t.textContent = '✓ COPIED!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function timeAgo(ts) {
  const d = Date.now() - ts, m = Math.floor(d / 6e4), h = Math.floor(d / 36e5);
  if (m < 1) return 'Just now'; if (m < 60) return m + 'm ago'; return h + 'h ago';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
