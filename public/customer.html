<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FanFlix – Your Codes</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E50914;--red2:#c8000e;
  --bg:#060606;--s1:#0e0e0e;--s2:#141414;--s3:#1a1a1a;--s4:#222;--s5:#2a2a2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#fff;--muted:#888;--muted2:#555;--muted3:#333;
  --green:#46d369;--amber:#f5a623;--blue:#4da6ff;
  --f:'Inter',sans-serif;--m:'IBM Plex Mono',monospace;--h:'Anton',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;-webkit-font-smoothing:antialiased}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg::before{content:'';position:absolute;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(229,9,20,.09),transparent 65%);animation:bgf 12s ease-in-out infinite}
.bg::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(229,9,20,.05),transparent 65%);animation:bgf 16s ease-in-out infinite reverse}
@keyframes bgf{0%,100%{transform:translate(0,0)}50%{transform:translate(2%,3%)}}

/* PROGRESS */
.prog{position:fixed;top:0;left:0;right:0;height:2px;z-index:1000}
.prog-bar{height:100%;background:var(--red);width:0;box-shadow:0 0 8px var(--red);transition:width .3s}
.prog.on .prog-bar{animation:progAnim 1.5s ease infinite}
@keyframes progAnim{0%{width:0;margin-left:0}50%{width:60%}100%{width:0;margin-left:100%}}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(6,6,6,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 1.3rem;height:58px;display:flex;align-items:center;justify-content:space-between;animation:slideDown .5s ease}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.logo{font-family:var(--h);font-size:1.75rem;letter-spacing:3px}
.logo .f{color:var(--red)}.logo .l{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(70,211,105,.08);border:1px solid rgba(70,211,105,.15);border-radius:100px;padding:5px 12px}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:lpulse 2s ease infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 0 rgba(70,211,105,.5)}70%{box-shadow:0 0 0 5px rgba(70,211,105,0)}}
.live-txt{font-family:var(--m);font-size:.58rem;letter-spacing:2px;color:var(--green);text-transform:uppercase}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--h);font-size:.95rem;color:#fff;letter-spacing:0;flex-shrink:0}

/* PAGE */
.page{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:1.3rem 1.2rem 6rem}

/* STATUS CARD */
.status-card{background:linear-gradient(135deg,rgba(70,211,105,.1),rgba(70,211,105,.02));border:1px solid rgba(70,211,105,.2);border-radius:18px;padding:1.4rem 1.5rem;margin-bottom:1rem;position:relative;overflow:hidden;animation:fadeUp .6s ease .1s both}
.status-card.warning{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.02));border-color:rgba(245,166,35,.25)}
.status-card.danger{background:linear-gradient(135deg,rgba(229,9,20,.1),rgba(229,9,20,.02));border-color:rgba(229,9,20,.25)}
.status-top{display:flex;align-items:center;gap:1rem;margin-bottom:.9rem}
.shield-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.shield-ring{position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(70,211,105,.25);animation:ringPulse 2s ease infinite}
.shield-ring2{position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(70,211,105,.12);animation:ringPulse 2s ease .5s infinite}
.warning .shield-ring{border-color:rgba(245,166,35,.25)}.warning .shield-ring2{border-color:rgba(245,166,35,.12)}
.danger .shield-ring{border-color:rgba(229,9,20,.25)}.danger .shield-ring2{border-color:rgba(229,9,20,.12)}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.6}}
.shield-ico{width:56px;height:56px;border-radius:16px;background:rgba(70,211,105,.15);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.warning .shield-ico{background:rgba(245,166,35,.15)}.danger .shield-ico{background:rgba(229,9,20,.15)}
.status-info{flex:1;min-width:0}
.status-title{font-size:1.05rem;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:7px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:lpulse 1.5s ease infinite}
.status-card.active .status-title{color:var(--green)}
.status-card.warning .status-title{color:var(--amber)}.status-card.warning .status-dot{background:var(--amber)}
.status-card.danger .status-title{color:var(--red)}.status-card.danger .status-dot{background:var(--red)}
.status-sub{font-size:.78rem;color:var(--muted);margin-bottom:.5rem}


.days-wrap{text-align:right;flex-shrink:0}
.days-num{font-family:var(--h);font-size:3rem;line-height:1;letter-spacing:1px;color:var(--green)}
.status-card.warning .days-num{color:var(--amber)}
.days-lbl{font-family:var(--m);font-size:.55rem;letter-spacing:2px;color:var(--muted2);text-transform:uppercase}
.extend-btn{margin-top:.4rem;background:transparent;border:1px solid rgba(70,211,105,.3);color:var(--green);padding:4px 12px;border-radius:100px;font-family:var(--m);font-size:.6rem;letter-spacing:1px;cursor:pointer;transition:all .2s}
.extend-btn:hover{background:rgba(70,211,105,.1)}

/* INFO GRID */
.info-grid{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1rem;animation:fadeUp .6s ease .15s both}
.info-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-cell{padding:.9rem 1rem;display:flex;align-items:center;gap:.75rem;border-right:1px solid var(--border);min-width:0;overflow:hidden}
.info-cell:last-child{border-right:none}
.info-icon{width:38px;height:38px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.info-icon.red{background:rgba(229,9,20,.15)}
.info-icon.green{background:rgba(70,211,105,.12)}
.info-icon.amber{background:rgba(245,166,35,.12)}
.info-icon.blue{background:rgba(77,166,255,.12)}
.info-lbl{font-family:var(--m);font-size:.53rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:3px}
.info-val{font-size:.85rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden}
.info-val.green{color:var(--green)}.info-val.amber{color:var(--amber)}
.copy-tiny{background:transparent;border:none;color:var(--muted2);cursor:pointer;padding:2px;transition:color .2s;flex-shrink:0}
.copy-tiny:hover{color:var(--text)}
.pin-toggle{background:transparent;border:none;color:var(--muted2);cursor:pointer;padding:2px;transition:color .2s}
.pin-toggle:hover{color:var(--text)}

/* REFRESH BTN */
.refresh-btn-big{width:100%;background:linear-gradient(135deg,var(--red),var(--red2));border:1px solid rgba(229,9,20,.4);border-radius:14px;padding:1.2rem;cursor:pointer;margin-bottom:1rem;animation:fadeUp .6s ease .2s both;position:relative;overflow:hidden;transition:all .2s}
.refresh-btn-big::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);pointer-events:none}
.refresh-btn-big::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);transition:transform .5s}
.refresh-btn-big:hover::after{transform:translateX(100%)}
.refresh-btn-big:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(229,9,20,.3)}
.refresh-btn-big:active{transform:scale(.99)}
.rbig-inner{display:flex;align-items:center;justify-content:center;gap:.7rem}
.rbig-icon{width:24px;height:24px;animation:none}
.rbig-icon.spinning{animation:spin 1s linear infinite}
.rbig-title{font-family:var(--h);font-size:1.2rem;letter-spacing:3px;color:#fff;text-transform:uppercase}
.rbig-sub{font-size:.72rem;color:rgba(255,255,255,.5);text-align:center;margin-top:.3rem;font-family:var(--m);letter-spacing:1px}

/* LIVE ACTIVITY */
.activity-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:1.2rem;margin-bottom:1rem;animation:fadeUp .6s ease .25s both}
.activity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.activity-title{display:flex;align-items:center;gap:.5rem;font-size:.9rem;font-weight:600}
.activity-icon{color:var(--red);font-size:.9rem}
.activity-list{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:.8rem;align-items:flex-start;padding:.55rem 0;position:relative}
.activity-item:not(:last-child)::after{content:'';position:absolute;left:5px;top:22px;bottom:-8px;width:1px;background:var(--s4)}
.act-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid var(--bg)}
.act-dot.red{background:var(--red)}.act-dot.amber{background:var(--amber)}.act-dot.grey{background:var(--muted3)}.act-dot.green{background:var(--green)}
.act-time{font-family:var(--m);font-size:.6rem;color:var(--muted2);flex-shrink:0;width:50px;padding-top:2px}
.act-body{}
.act-title{font-size:.8rem;font-weight:500;color:var(--text)}
.act-sub{font-size:.72rem;color:var(--muted2);margin-top:1px}

/* CODES SECTION */
.codes-section{animation:fadeUp .6s ease .3s both}
.codes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.codes-title{font-size:.85rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.5rem}
.code-count-badge{background:var(--s3);border:1px solid var(--border);border-radius:100px;padding:2px 9px;font-family:var(--m);font-size:.6rem;color:var(--muted)}

/* TABS pill */
.tabs{display:flex;gap:.4rem;margin-bottom:.9rem;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-family:var(--f);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active-all{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);color:var(--text)}
.tab.active-household{background:rgba(70,211,105,.1);border-color:rgba(70,211,105,.25);color:var(--green)}
.tab.active-update{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.25);color:var(--amber)}
.tab.active-signin{background:rgba(77,166,255,.1);border-color:rgba(77,166,255,.25);color:var(--blue)}
.tc{font-family:var(--m);font-size:.6rem;opacity:.7}

/* CODE CARDS */
.cards{display:flex;flex-direction:column;gap:.7rem}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:1rem;position:relative;overflow:hidden;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;transition:transform .2s,border-color .2s,box-shadow .2s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.household::before{background:linear-gradient(180deg,var(--green),rgba(70,211,105,.2))}
.card.update::before{background:linear-gradient(180deg,var(--amber),rgba(245,166,35,.2))}
.card.signin::before{background:linear-gradient(180deg,var(--blue),rgba(77,166,255,.2))}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.015) 50%,transparent 60%);transform:translateX(-100%);transition:transform .5s;pointer-events:none}
.card:hover::after{transform:translateX(100%)}
.card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.card.fresh.household{border-color:rgba(70,211,105,.2);background:linear-gradient(135deg,rgba(70,211,105,.06),var(--s1) 50%)}
.card.fresh.update{border-color:rgba(245,166,35,.2);background:linear-gradient(135deg,rgba(245,166,35,.06),var(--s1) 50%)}
.card.fresh.signin{border-color:rgba(77,166,255,.2);background:linear-gradient(135deg,rgba(77,166,255,.06),var(--s1) 50%)}

.fresh-badge{position:absolute;top:9px;right:11px;font-family:var(--m);font-size:.5rem;letter-spacing:2px;padding:2px 8px;border-radius:3px;font-weight:500;text-transform:uppercase}
.household .fresh-badge{background:var(--green);color:#000;animation:fglow 2s ease infinite}
.update .fresh-badge{background:var(--amber);color:#000}
.signin .fresh-badge{background:var(--blue);color:#fff}
@keyframes fglow{0%,100%{box-shadow:0 0 6px rgba(70,211,105,.3)}50%{box-shadow:0 0 16px rgba(70,211,105,.7)}}

.c-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s;position:relative}
.card:hover .c-ico{transform:scale(1.06)}
.household .c-ico{background:rgba(70,211,105,.1)}.update .c-ico{background:rgba(245,166,35,.1)}.signin .c-ico{background:rgba(77,166,255,.1)}
.phone-icon{transition:transform .1s}
.card.household:hover .phone-icon,.card.signin:hover .phone-icon{animation:vib .4s ease}
@keyframes vib{0%,100%{transform:rotate(0)}20%{transform:rotate(-10deg)}40%{transform:rotate(10deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(6deg)}}
.pdot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--s1);animation:dotpop 1.5s ease infinite}
@keyframes dotpop{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.tv-wrap{position:relative;width:28px;height:22px}
.tv-screen{position:absolute;inset:3px 4px 5px;background:rgba(245,166,35,.15);border-radius:1px;overflow:hidden}
.tv-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.9),transparent);animation:scan 2s ease infinite}
.card.update:hover .tv-scan{animation-duration:.5s}
@keyframes scan{0%{top:-2px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:110%;opacity:0}}

.c-type{font-family:var(--m);font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px}
.household .c-type{color:var(--green)}.update .c-type{color:var(--amber)}.signin .c-type{color:var(--blue)}
.c-code{font-family:var(--h);font-size:2.6rem;letter-spacing:12px;color:var(--text);line-height:1;transition:color .2s}
.card:active .c-code{color:var(--green)}
.c-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-family:var(--f);font-size:.78rem;font-weight:500;border:1px solid;border-radius:7px;padding:9px 15px;margin-top:5px;transition:all .2s;position:relative;overflow:hidden}
.c-link.g{color:var(--green);border-color:rgba(70,211,105,.22)}.c-link.g:hover{background:rgba(70,211,105,.08);border-color:var(--green)}
.c-link.a{color:var(--amber);border-color:rgba(245,166,35,.22)}.c-link.a:hover{background:rgba(245,166,35,.08);border-color:var(--amber)}
.c-meta{display:flex;align-items:center;gap:.7rem;margin-top:5px}
.c-age{font-family:var(--m);font-size:.58rem;color:var(--muted3)}
.c-countdown{font-family:var(--m);font-size:.6rem}
.countdown-ok{color:var(--green)}.countdown-warn{color:var(--amber)}.countdown-exp{color:var(--red)}
.countdown-time{font-weight:500;letter-spacing:1px}
.cflip{animation:cflip .15s ease}
@keyframes cflip{0%{opacity:0;transform:translateY(-4px)}100%{opacity:1;transform:none}}

.cp-btn{background:var(--s3);border:1px solid var(--s5);color:var(--muted2);padding:9px 15px;border-radius:8px;cursor:pointer;font-family:var(--m);font-size:.63rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap;flex-shrink:0}
.cp-btn:hover{border-color:var(--border2);color:var(--text);background:var(--s4)}
.cp-btn.ok{border-color:var(--green)!important;color:var(--green)!important;background:rgba(70,211,105,.07)!important}

/* QUICK TIP */
.tip-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.3rem;margin-top:1rem;display:flex;align-items:center;gap:1rem;animation:fadeUp .6s ease .35s both}
.tip-ico{width:44px;height:44px;border-radius:12px;background:rgba(229,9,20,.1);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.tip-title{font-size:.82rem;font-weight:600;margin-bottom:3px}
.tip-desc{font-size:.73rem;color:var(--muted);line-height:1.5}
.tip-visual{flex-shrink:0;display:flex;align-items:center;gap:.3rem;opacity:.4}

/* COPY OVERLAY */
.copy-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s}
.copy-overlay.show{opacity:1}
.copy-box{background:rgba(0,0,0,.92);border:1px solid rgba(70,211,105,.3);border-radius:20px;padding:1.8rem 2.5rem;display:flex;flex-direction:column;align-items:center;gap:.7rem;backdrop-filter:blur(20px);transform:scale(.8);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.copy-overlay.show .copy-box{transform:scale(1)}
.copy-check{width:52px;height:52px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;animation:cbounce .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cbounce{from{transform:scale(0)}to{transform:scale(1)}}
.copy-lbl{font-family:var(--h);font-size:1.1rem;letter-spacing:3px;color:var(--text);text-transform:uppercase}

/* SKELETON */
.skel-wrap{display:flex;flex-direction:column;gap:.7rem}
.skel-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;display:flex;gap:1rem;align-items:center}
.sk{background:linear-gradient(90deg,var(--s3) 25%,var(--s4) 50%,var(--s3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.sk-i{width:48px;height:48px;border-radius:12px;flex-shrink:0}
.sk-b{flex:1}
.sk-l{height:9px;margin-bottom:10px;border-radius:3px}
.sk-c{height:38px;width:55%;border-radius:4px}
.sk-s{height:7px;width:28%;margin-top:8px;border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem}
.empty-ico{font-size:2.5rem;margin-bottom:.8rem;opacity:.2;display:block}
.empty h3{font-family:var(--h);font-size:1.2rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.empty p{font-size:.8rem;color:var(--muted2);line-height:1.8}

/* EXPIRED */
.exp-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:2rem;text-align:center}
.exp-logo{font-family:var(--h);font-size:2rem;letter-spacing:3px;margin-bottom:2rem}
.exp-logo .f{color:var(--red)}.exp-logo .l{color:var(--muted3)}
.exp-box{background:var(--s1);border:1px solid rgba(229,9,20,.2);border-radius:20px;padding:2.5rem 2rem;max-width:380px;width:100%}
.exp-ico{font-size:3rem;display:block;margin-bottom:1rem;animation:shake 1s ease .5s}
@keyframes shake{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-10deg)}40%,80%{transform:rotate(10deg)}}
.exp-title{font-family:var(--h);font-size:1.8rem;letter-spacing:2px;color:var(--red);margin-bottom:.5rem;text-transform:uppercase}
.exp-msg{font-size:.85rem;color:var(--muted);line-height:1.8;margin-bottom:1.8rem}
.wa-big{display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#000;padding:13px 26px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem;transition:all .25s;box-shadow:0 4px 20px rgba(37,211,102,.3)}
.wa-big:hover{background:#1ebe5d;transform:translateY(-2px)}

/* WA FLOAT */

}

<script>
let allCodes=[],curTab='all',pinShown=false,activityLog=[],refreshTimer=null,cdTimer=null;
const BLOCKED=['2023','2024','2025','2026','2027','2028','0000'];

window.onload=()=>{
  const token=window.location.pathname.match(/\/c\/([a-zA-Z0-9]+)/)?.[1];
  if(!token){showError('invalid','Invalid link.');return;}
  window._tok=token;
  startProg();
  fetchCodes(token);
};

function startProg(){document.getElementById('prog').classList.add('on')}
function stopProg(){
  const p=document.getElementById('prog');p.classList.remove('on');
  const b=document.getElementById('pbar');b.style.width='100%';
  setTimeout(()=>{b.style.width='0';},400);
}

async function fetchCodes(token,isRefresh=false){
  if(isRefresh){
    startProg();
    const rb=document.getElementById('rbig-icon');if(rb)rb.classList.add('spinning');
    addActivity('red','Scanning...','Checking inbox for new codes');
  }
  try{
    const res=await fetch(`/api/link/${token}`);
    const data=await res.json();
    stopProg();
    if(!data.success){
      if(data.error==='expired')showExpired();
      else showError(data.error,data.message);
      return;
    }
    const now=Date.now();
    data.codes=data.codes.filter(c=>{
      if(c.code&&BLOCKED.includes(c.code))return false;
      if(c.expiresAt&&c.expiresAt<now)return false;
      return true;
    });
    const seen=new Set();
    data.codes=data.codes.filter(c=>{const k=c.code||c.link;if(seen.has(k))return false;seen.add(k);return true;});
    allCodes=data.codes;
    window._ld=data;

    if(!isRefresh){
      buildPage(data);
      addActivity('green','Ready','System is active and monitoring');
    } else {
      updatePage(data);
      const rb=document.getElementById('rbig-icon');if(rb)rb.classList.remove('spinning');
      if(data.codes.length>0){
        addActivity('green',`${data.codes.length} code(s) found`,'Codes are ready to copy');
      } else {
        addActivity('grey','No codes found','Inbox is clear');
      }
    }

    if(refreshTimer)clearInterval(refreshTimer);
    refreshTimer=setInterval(()=>fetchCodes(token,true),2*60*1000);
    if(cdTimer)clearInterval(cdTimer);
    cdTimer=setInterval(tickCd,1000);

    if(data.daysLeft<=3&&data.daysLeft>0){
      setTimeout(()=>{const p=document.getElementById('renewal-popup');if(p){p.style.display='flex';setTimeout(()=>p.style.opacity='1',50);}},1500);
    }
  }catch(e){
    stopProg();
    const rb=document.getElementById('rbig-icon');if(rb)rb.classList.remove('spinning');
    if(!isRefresh)showError('error','Could not connect.');
    addActivity('red','Error','Connection failed');
  }
}

function buildPage(data){

  // Update nav avatar
  const av=document.getElementById('nav-avatar');

  // Set shield icon based on status
  setTimeout(()=>{
    const si=document.getElementById('shield-ico-wrap');

      const color=statusCls==='active'?'#46d369':statusCls==='warning'?'#f5a623':'#E50914';

  const h=allCodes.filter(c=>c.type==='household').length;

  document.getElementById('page').innerHTML=`
  <div class="page">

    <!-- INFO GRID -->

      <div class="info-row">

          <div class="info-icon red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E50914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
          <div><div class="info-lbl">Netflix Email</div>

        </div>
        <div class="info-cell">
          <div class="info-icon blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4da6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <div><div class="info-lbl">Profile</div><div class="info-val">${esc(data.profile||'-')}</div></div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-cell">
          <div class="info-icon amber"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <div><div class="info-lbl">PIN</div>
          <div class="info-val"><span id="pin-display">••••</span><button class="pin-toggle" onclick="togglePin()" id="pin-btn" title="Show/hide PIN"><svg id="eye-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
        </div>
        <div class="info-cell">
          <div class="info-icon green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#46d369" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></div>
          <div><div class="info-lbl">Account Status</div><div class="info-val green">Active</div></div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-cell">
          <div class="info-icon" style="background:var(--s3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
          <div><div class="info-lbl">Device Status</div><div><div class="info-val green">Active</div><div style="font-size:.62rem;font-family:var(--m);color:var(--muted2);margin-top:2px">2 Logins Allowed</div></div></div>
        </div>
        <div class="info-cell">
          <div class="info-icon" style="background:var(--s3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <div><div class="info-lbl">Membership</div><div><div class="info-val">Premium</div><div style="font-size:.62rem;font-family:var(--m);color:var(--muted2);margin-top:2px">Renews in ${days} days</div></div></div>

      </div>
    </div>

    <!-- REFRESH BTN -->

    <!-- LIVE ACTIVITY -->

        <div class="activity-item"><div class="act-dot green"></div><div class="act-time">${timeStr}</div><div class="act-body"><div class="act-title">Ready for refresh</div><div class="act-sub">System is active</div></div></div>

    <!-- CODES -->
    <div class="codes-section">

        <button class="tab active-all" id="tab-all" onclick="switchTab('all')">All <span class="tc">${allCodes.length}</span></button>
        <button class="tab" id="tab-household" onclick="switchTab('household')">📱 Household <span class="tc">${h}</span></button>
        <button class="tab" id="tab-update" onclick="switchTab('update')">📺 TV Update <span class="tc">${u}</span></button>
        ${s>0?`<button class="tab" id="tab-signin" onclick="switchTab('signin')">🔑 Sign-in <span class="tc">${s}</span></button>`:''}
      </div>
      <div class="cards" id="cards"></div>
    </div>

    <!-- QUICK TIP -->
    <div class="tip-card">
      <div class="tip-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E50914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg></div>
      <div>
        <div class="tip-title">Quick Tip</div>
        <div class="tip-desc">Request a Netflix code on your TV or device first, then tap 'Refresh Codes'.</div>
      </div>
      <div class="tip-visual">
        <svg width="32" height="24" viewBox="0 0 32 24" fill="none"><rect x="0" y="0" width="32" height="20" rx="3" fill="#E50914" opacity=".3"/><text x="8" y="15" font-size="14" fill="#E50914" font-weight="bold">N</text></svg>
      </div>
    </div>

  </div>`;

  renderCards();
}

function updatePage(data){
  allCodes=data.codes;
  const h=allCodes.filter(c=>c.type==='household').length;
  const u=allCodes.filter(c=>c.type==='update').length;
  const s=allCodes.filter(c=>c.type==='signin').length;
  const safe=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  safe('code-badge',allCodes.length);
  renderCards(true);
}

function addActivity(dotCls,title,sub){
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  activityLog.unshift({dotCls,title,sub,time:now});
  if(activityLog.length>4)activityLog=activityLog.slice(0,4);
  const list=document.getElementById('activity-list');
  if(!list)return;
  list.innerHTML=activityLog.map(a=>`
    <div class="activity-item">
      <div class="act-dot ${a.dotCls}"></div>
      <div class="act-time">${a.time}</div>
      <div class="act-body"><div class="act-title">${a.title}</div><div class="act-sub">${a.sub}</div></div>
    </div>`).join('');
}

function togglePin(){
  pinShown=!pinShown;
  const d=document.getElementById('pin-display');
  if(d)d.textContent=pinShown?(window._ld?.pin||'----'):'••••';
}

function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(x=>{x.className='tab';});
  const el=document.getElementById('tab-'+t);if(el)el.classList.add('tab','active-'+t);
  renderCards(false);
}

function renderCards(smooth=false){
  const list=curTab==='all'?allCodes:allCodes.filter(i=>i.type===curTab);
  const c=document.getElementById('cards');if(!c)return;
  if(!list.length){
    c.innerHTML=`<div class="empty"><span class="empty-ico">📭</span><h3>No Codes Found</h3><p>No Netflix codes in the last 20 minutes.<br>Request a code on your device,<br>then tap Refresh Codes.</p></div>`;
    return;
  }
  const html=list.map((item,i)=>cardHtml(item,i)).join('');
  if(smooth){
    c.style.opacity='0';c.style.transform='translateY(8px)';c.style.transition='opacity .25s,transform .25s';
    setTimeout(()=>{c.innerHTML=html;c.style.opacity='1';c.style.transform='none';attachL();},200);
  }else{c.innerHTML=html;attachL();}
}

function attachL(){
  document.querySelectorAll('.card[data-code]').forEach(c=>{
    c.addEventListener('click',()=>doCopy(c.dataset.code,null,true));
  });
}

function cardHtml(item,i){
  const delay=`animation-delay:${i*.08}s`;
  const age=timeAgo(item.ts);
  const fresh=(Date.now()-item.ts)<10*60*1000;
  const fc=fresh?' fresh':'';
  const fb=fresh?'<span class="fresh-badge">Fresh</span>':'';
  const cd=item.expiresAt?`<span class="countdown-wrap" data-exp="${item.expiresAt}">${fmtCd(item.expiresAt)}</span>`:'';

  const phoneIco=`<div class="c-ico" style="position:relative"><svg class="phone-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#46d369" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.5" stroke-linecap="round"/></svg><div class="pdot"></div></div>`;
  const tvIco=`<div class="c-ico"><div class="tv-wrap"><svg width="28" height="20" viewBox="0 0 24 20" fill="none" stroke="#f5a623" stroke-width="2"><rect x="1" y="1" width="22" height="14" rx="2"/><line x1="8" y1="18" x2="16" y2="18"/><line x1="12" y1="15" x2="12" y2="18"/></svg><div class="tv-screen"><div class="tv-scan"></div></div></div></div>`;
  const lockIco=`<div class="c-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4da6ff" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>`;

  if(item.type==='update')return`<div class="card update${fc}" style="${delay}">${fb}${tvIco}<div style="min-width:0"><div class="c-type">TV Household Update</div><a class="c-link a" href="${esc(item.link)}" target="_blank">Update Household →</a><div class="c-meta"><span class="c-age">${age}</span></div></div><button class="cp-btn" onclick="doCopy('${esc(item.link)}',this,false)">Copy</button></div>`;

  if(item.type==='signin')return`<div class="card signin${fc}" style="${delay}" data-code="${esc(item.code)}">${fb}${lockIco}<div style="min-width:0"><div class="c-type">Sign-in Code</div><div class="c-code">${item.code}</div><div class="c-meta"><span class="c-age">${age}</span>${cd}</div></div><button class="cp-btn" onclick="event.stopPropagation();doCopy('${esc(item.code)}',this,false)">Copy</button></div>`;

  if(item.code)return`<div class="card household${fc}" style="${delay}" data-code="${esc(item.code)}">${fb}${phoneIco}<div style="min-width:0"><div class="c-type">Temporary Access Code</div><div class="c-code">${item.code}</div><div class="c-meta"><span class="c-age">${age}</span>${cd}</div></div><button class="cp-btn" onclick="event.stopPropagation();doCopy('${esc(item.code)}',this,false)">Copy</button></div>`;

  return`<div class="card household${fc}" style="${delay}">${fb}${phoneIco}<div style="min-width:0"><div class="c-type">Temporary Access Code</div><a class="c-link g" href="${esc(item.link)}" target="_blank">Get Code →</a><div class="c-meta"><span class="c-age">${age}</span>${cd}</div></div><button class="cp-btn" onclick="doCopy('${esc(item.link)}',this,false)">Copy</button></div>`;
}

function showExpired(){
  document.getElementById('page').innerHTML=`<div class="exp-wrap"><div class="exp-logo"><span class="f">FAN</span><span class="l">FLIX</span></div><div class="exp-box"><span class="exp-ico">⏰</span><div class="exp-title">Subscription Expired</div><div class="exp-msg">Your FanFlix subscription has expired.<br>Contact us to renew and keep watching.</div><a class="wa-big" href="https://wa.me/8801928382918" target="_blank">💬 Renew on WhatsApp</a></div></div>`;
}

function showError(type,msg){
  document.getElementById('page').innerHTML=`<div class="exp-wrap"><div class="exp-logo"><span class="f">FAN</span><span class="l">FLIX</span></div><div class="exp-box"><span class="exp-ico">${type==='revoked'?'🚫':'❌'}</span><div class="exp-title">${type==='revoked'?'Access Revoked':'Error'}</div><div class="exp-msg">${msg||'Contact FanFlix BD.'}</div><a class="wa-big" href="https://wa.me/8801928382918" target="_blank">💬 Contact FanFlix BD</a></div></div>`;
}

function fmtCd(exp){
  const r=exp-Date.now();
  if(r<=0)return'<span class="c-countdown countdown-exp">⏱ Expired</span>';
  const m=Math.floor(r/60000),s=Math.floor((r%60000)/1000);
  const cls=r<2*60*1000?'countdown-warn':'countdown-ok';
  if(r<2*60*1000&&r>119000)playBeep();
  return`<span class="c-countdown ${cls}">⏱ <span class="countdown-time">${m}:${s.toString().padStart(2,'0')}</span></span>`;
}

function tickCd(){
  document.querySelectorAll('[data-exp]').forEach(el=>{
    const exp=parseInt(el.dataset.exp);if(!exp)return;
    const nt=fmtCd(exp);
    const te=el.querySelector('.countdown-time');
    const match=nt.match(/>(\d+:\d+)<\/span>/);
    if(te&&match&&te.textContent!==match[1]){te.classList.add('cflip');te.textContent=match[1];setTimeout(()=>te.classList.remove('cflip'),150);}
    else if(!te)el.outerHTML=nt;
  });
}

function doCopy(text,btn,overlay){
  navigator.clipboard.writeText(text).then(()=>{
    if(btn){btn.textContent='✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},2000);}
    if(overlay){const o=document.getElementById('copy-overlay');o.classList.add('show');setTimeout(()=>o.classList.remove('show'),1200);}
    showToast('✓ COPIED!');
  });
}

function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.frequency.value=880;g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);osc.start();osc.stop(ctx.currentTime+.3);}catch(e){}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function timeAgo(ts){const d=Date.now()-ts,m=Math.floor(d/6e4),h=Math.floor(d/36e5);if(m<1)return'Just now';if(m<60)return m+'m ago';return h+'h ago';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
